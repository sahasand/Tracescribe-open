<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feasibility Workbench - TraceScribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --font:'Plus Jakarta Sans',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    --bg:hsl(30 20% 98%); --card:#fff; --muted:hsl(220 14% 96%);
    --fg:hsl(222 47% 11%); --mut-fg:hsl(220 9% 46%);
    --primary:hsl(168 76% 32%); --primary-soft:hsl(168 76% 32%/.1);
    --accent:hsl(25 95% 53%); --accent-soft:hsl(25 95% 53%/.12); --border:hsl(220 13% 91%);
    --success:hsl(160 84% 36%); --warning:hsl(38 92% 50%); --info:hsl(199 89% 48%); --danger:hsl(0 72% 51%);
    --radius:10px; --shadow:0 1px 3px rgb(0 0 0/.1),0 1px 2px -1px rgb(0 0 0/.1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);font-weight:500;background:var(--bg);color:var(--fg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--mono)}
  header{position:sticky;top:0;z-index:20;background:hsl(0 0% 100%/.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .hwrap{max-width:1340px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;flex:none}
  .logo svg{width:17px;height:17px;color:#fff}
  .brand{font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .brand small{display:block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.16em;color:var(--primary);text-transform:uppercase}
  .hmeta{margin-left:auto;display:flex;align-items:center;gap:10px}
  .pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--primary-soft);color:var(--primary)}
  .rag{display:inline-flex;align-items:center;gap:7px;font-family:var(--font);font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:999px}
  .rag .d{width:9px;height:9px;border-radius:50%}
  .rag.green{background:hsl(160 84% 36%/.13);color:var(--success)} .rag.green .d{background:var(--success)}
  .rag.amber{background:hsl(38 92% 50%/.15);color:hsl(38 75% 38%)} .rag.amber .d{background:var(--warning)}
  .rag.red{background:hsl(0 72% 51%/.13);color:var(--danger)} .rag.red .d{background:var(--danger)}
  .ctx{max-width:1340px;margin:0 auto;padding:18px 20px 0}
  .ctx h1{font-size:20px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ctx h1 .ph{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:6px;background:var(--accent-soft);color:hsl(25 80% 42%)}
  .ctx .sub{font-size:13px;color:var(--mut-fg);margin-top:4px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .ctx .sub b{color:var(--fg);font-weight:600}
  .ctx .dot{width:3px;height:3px;border-radius:50%;background:var(--border)}
  .tabs{max-width:1340px;margin:14px auto 0;padding:0 20px;display:flex;gap:3px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .tab{font-family:var(--font);font-weight:600;font-size:14px;color:var(--mut-fg);background:none;border:0;border-bottom:2px solid transparent;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:7px;margin-bottom:-1px}
  .tab:hover{color:var(--fg)}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
  main{max-width:1340px;margin:0 auto;padding:18px 20px 64px}
  .wb{display:grid;grid-template-columns:316px 1fr;gap:20px;align-items:start}
  @media(max-width:980px){.wb{grid-template-columns:1fr}}
  /* control rail */
  .rail{position:sticky;top:74px;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  @media(max-width:980px){.rail{position:static}}
  .rail .rh{font-size:11.5px;font-family:var(--mono);font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mut-fg);padding:13px 15px 4px;display:flex;align-items:center;gap:8px}
  .rail .rh svg{width:14px;height:14px;color:var(--primary)}
  .rail .rb{padding:6px 15px 15px}
  .grp{border-top:1px solid var(--border);padding:12px 0 4px;margin-top:8px}
  .grp:first-child{border-top:0;margin-top:0;padding-top:4px}
  .grp .gl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mut-fg);margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .grp .gl svg{width:13px;height:13px;flex:none;color:var(--primary)}
  .ctl{margin-bottom:13px}
  .ctl .cl{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:5px}
  .ctl .cl b{font-family:var(--mono);font-weight:700;font-size:12.5px;color:var(--primary)}
  input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--muted);border-radius:99px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgb(0 0 0/.25)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid #fff}
  .crit-list{display:flex;flex-direction:column;gap:3px}
  .crit-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12px}
  .crit-row:hover{background:var(--muted)}
  .crit-row .cb{width:30px;height:17px;border-radius:99px;background:var(--border);position:relative;flex:none;transition:background .15s}
  .crit-row .cb i{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgb(0 0 0/.3)}
  .crit-row.on .cb{background:var(--primary)} .crit-row.on .cb i{left:15px}
  .crit-row .cn{flex:1;line-height:1.25}
  .crit-row .cn em{font-style:normal;font-family:var(--mono);font-size:10px;color:var(--mut-fg);display:block}
  .crit-row .kf{font-family:var(--mono);font-size:8.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:1px 5px;border-radius:5px;flex:none}
  .crit-row.off .cn{color:var(--mut-fg);text-decoration:line-through}
  .seg{display:flex;gap:4px;background:var(--muted);padding:3px;border-radius:9px}
  .seg button{flex:1;font-family:var(--font);font-weight:600;font-size:11.5px;border:0;background:none;color:var(--mut-fg);padding:6px 4px;border-radius:7px;cursor:pointer}
  .seg button.on{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
  /* stage + cards */
  .view{display:none} .view.on{display:block}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);margin-bottom:18px}
  .card>.h{font-size:12px;font-family:var(--mono);font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--mut-fg);padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .card>.h svg{width:15px;height:15px;color:var(--primary)}
  .card>.h .r{margin-left:auto;font-family:var(--font);font-size:12px;font-weight:600;text-transform:none;letter-spacing:0;color:var(--mut-fg)}
  .card>.b{padding:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .mini{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:14px 15px;cursor:pointer;transition:border-color .15s,transform .12s}
  .mini:hover{border-color:hsl(168 76% 32%/.5);transform:translateY(-1px)}
  .mini .mh{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .mini .mh svg{width:15px;height:15px;color:var(--primary)}
  .mini .mh .t{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mut-fg)}
  .mini .mh .go{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--primary);display:flex;align-items:center;gap:3px}
  .mini .mh .go svg{width:12px;height:12px}
  .mval{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
  .msub{font-family:var(--mono);font-size:10.5px;color:var(--mut-fg);margin-top:2px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--card);border:1px solid var(--border);border-left-width:3px;border-radius:12px;padding:12px 13px;box-shadow:var(--shadow)}
  .kpi .l{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mut-fg)}
  .kpi .v{font-size:23px;font-weight:800;letter-spacing:-.02em;margin-top:4px;line-height:1}
  .kpi .s{font-family:var(--mono);font-size:9.5px;color:var(--mut-fg);margin-top:4px}
  .kpi.teal{border-left-color:var(--primary)} .kpi.teal .v{color:var(--primary)}
  .kpi.green{border-left-color:var(--success)} .kpi.green .v{color:var(--success)}
  .kpi.amber{border-left-color:var(--warning)} .kpi.amber .v{color:hsl(38 80% 42%)}
  .kpi.red{border-left-color:var(--danger)} .kpi.red .v{color:var(--danger)}
  .kpi.coral{border-left-color:var(--accent)} .kpi.coral .v{color:hsl(25 80% 46%)}
  /* funnel */
  .fn{display:flex;flex-direction:column;gap:6px}
  .fnrow{display:grid;grid-template-columns:1fr 150px;align-items:center;gap:12px}
  .fnrow .fl{font-size:12.5px;display:flex;align-items:center;gap:7px;min-width:0}
  .fnrow .fl .ftxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fnrow .fl .ty{font-family:var(--mono);font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:4px;flex:none}
  .fnrow .fl .ty.inc{background:var(--primary-soft);color:var(--primary)}
  .fnrow .fl .ty.exc{background:hsl(0 72% 51%/.1);color:var(--danger)}
  .fnrow .fl .kf{font-family:var(--mono);font-size:8.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:1px 5px;border-radius:4px;flex:none}
  .fnbar{height:24px;border-radius:6px;background:var(--muted);position:relative;overflow:hidden}
  .fnbar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),hsl(168 70% 42%));border-radius:6px;transition:width .3s}
  body.still .fnbar i{transition:none}
  .fnbar span{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--fg)}
  .fnbar .drop{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9.5px;color:var(--danger)}
  table.tbl{border-collapse:collapse;width:100%;font-size:12.5px}
  table.tbl th{background:var(--muted);font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--mut-fg);text-align:left;padding:8px 10px}
  table.tbl td{padding:8px 10px;border-top:1px solid var(--border)}
  table.tbl td.num{font-family:var(--mono);text-align:right}
  table.tbl tr.killer td{background:hsl(25 95% 53%/.06)}
  .cap{font-size:11.5px;color:var(--mut-fg);margin-top:12px;line-height:1.5}
  .cap code{font-family:var(--mono);background:var(--muted);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--fg)}
  .reg{display:flex;flex-direction:column;gap:8px}
  .regrow{display:grid;grid-template-columns:128px 1fr 118px;align-items:center;gap:11px}
  .regrow .rn{font-size:12.5px;font-weight:600}
  .regrow .rt{height:16px;border-radius:6px;background:var(--muted);overflow:hidden}
  .regrow .rt i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--primary),hsl(168 70% 44%));transition:width .3s}
  body.still .regrow .rt i{transition:none}
  .regrow .rv{font-family:var(--mono);font-size:10.5px;color:var(--mut-fg);text-align:right}
  .regrow .rv b{color:var(--fg);font-weight:700}
  .dims{display:flex;flex-direction:column;gap:10px}
  .dim{display:grid;grid-template-columns:140px 1fr 86px;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:11px}
  .dim.green{border-left:3px solid var(--success)} .dim.amber{border-left:3px solid var(--warning)} .dim.red{border-left:3px solid var(--danger)}
  .dim .dn{font-size:13px;font-weight:700}
  .dim .dn em{display:block;font-style:normal;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--mut-fg)}
  .dim .dbar{height:8px;border-radius:99px;background:var(--muted);overflow:hidden}
  .dim .dbar i{display:block;height:100%;border-radius:99px;transition:width .3s}
  body.still .dim .dbar i{transition:none}
  .dim.green .dbar i{background:var(--success)} .dim.amber .dbar i{background:var(--warning)} .dim.red .dbar i{background:var(--danger)}
  .dim .dt{font-family:var(--mono);font-size:11px;font-weight:700;text-align:right}
  .dim .dt small{display:block;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.05em}
  .dim.green .dt{color:var(--success)} .dim.amber .dt{color:hsl(38 75% 38%)} .dim.red .dt{color:var(--danger)}
  .verdict{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .verdict .vtxt .vl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut-fg)}
  .verdict .vtxt .vv{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
  .verdict .vtxt .vd{font-size:12.5px;color:var(--mut-fg);max-width:340px;margin-top:3px}
  .note{font-size:12px;background:hsl(168 76% 32%/.05);border:1px solid hsl(168 76% 32%/.18);border-radius:10px;padding:11px 13px;color:var(--fg);line-height:1.5;margin-top:4px}
  .note b{color:var(--primary)}
  svg.chart{display:block;width:100%;height:auto}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></span>
    <div class="brand">TraceScribe<small>Feasibility</small></div>
    <div class="hmeta">
      <span class="pill">HFrEF Phase 3</span>
      <span class="rag amber" id="hrag"><span class="d"></span><span id="hrag-t">...</span></span>
    </div>
  </div>
</header>
<div class="ctx">
  <h1><span class="ph">FEASIBILITY</span> Trial Feasibility Workbench</h1>
  <div class="sub"><span>Heart failure, reduced EF (NYHA II-IV)</span><span class="dot"></span><span><b id="s-arms">2 arms 1:1</b></span><span class="dot"></span><span>Global, <b id="s-sites">60</b> sites</span><span class="dot"></span><span>Target <b id="s-n">1,000</b> randomized</span><span class="dot"></span><span>One control panel, four live consequences</span></div>
</div>
<div class="tabs" id="tabs"></div>
<div id="selftest" hidden></div>
<main>
  <div class="wb">
    <aside class="rail">
      <div class="rh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg> Scenario controls</div>
      <div class="rb" id="rail"></div>
    </aside>
    <section class="stage">
      <div class="view on" id="v-cockpit"></div>
      <div class="view" id="v-eligibility"></div>
      <div class="view" id="v-enrollment"></div>
      <div class="view" id="v-sites"></div>
      <div class="view" id="v-gono"></div>
    </section>
  </div>
</main>
<script>
"use strict";
var $=function(s,r){return (r||document).querySelector(s);};
function clamp(x,a,b){return x<a?a:(x>b?b:x);}
function comma(n){return Math.round(n).toLocaleString('en-US');}
function pct(x,d){return (100*x).toFixed(d==null?0:d)+'%';}

/* ---------- seeded PRNG + samplers (per-stream) ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function streamSeed(){var s=2166136261>>>0;for(var i=0;i<arguments.length;i++){s^=(arguments[i]|0);s=Math.imul(s,16777619);}return s>>>0;}
function makeRng(){var seeds=Array.prototype.slice.call(arguments);return mulberry32(streamSeed.apply(null,seeds));}
function gauss(rng){var u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
// Marsaglia-Tsang gamma (shape>=1); scale applied by caller
function gammaSample(rng,shape){
  if(shape<1){var u=rng();return gammaSample(rng,shape+1)*Math.pow(u,1/shape);}
  var d=shape-1/3, c=1/Math.sqrt(9*d);
  for(;;){var x,v;do{x=gauss(rng);v=1+c*x;}while(v<=0);v=v*v*v;var u2=rng();
    if(u2<1-0.0331*x*x*x*x)return d*v;
    if(Math.log(u2)<0.5*x*x+d*(1-v+Math.log(v)))return d*v;}
}
function poissonSample(rng,lam){
  if(lam<=0)return 0;
  if(lam<30){var L=Math.exp(-lam),k=0,p=1;do{k++;p*=rng();}while(p>L);return k-1;}
  // normal approx for large lambda
  return Math.max(0,Math.round(lam+Math.sqrt(lam)*gauss(rng)));
}
function normCdf(z){var t=1/(1+0.2316419*Math.abs(z));
  var d=0.3989423*Math.exp(-z*z/2);
  var p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return z>0?1-p:p;}

/* ---------- synthetic HFrEF population (fixed, seeded) ---------- */
var POP_N=5000, POP=[];
(function genPop(){
  var rng=makeRng(424242,7);
  for(var i=0;i<POP_N;i++){
    var nu=rng(), nyha=nu<0.45?2:(nu<0.90?3:4);
    var p={
      age:clamp(67+11*gauss(rng),30,95),
      nyha:nyha,
      lvef:clamp(30+7*gauss(rng),10,60),
      egfr:clamp(62+22*gauss(rng),8,120),
      sbp:clamp(122+16*gauss(rng),70,205),
      k:clamp(4.4+0.45*gauss(rng),2.6,7),
      priorHosp:rng()<0.60,
      bnp:rng()<0.55,
      gdmt:rng()<0.80,
      recent:rng()<0.08,
      preg:rng()<0.02,
      lifeExp:rng()<0.05,
      otherTrial:rng()<0.05
    };
    POP.push(p);
  }
})();

/* ---------- criteria (predicate per patient) ---------- */
// thr is live-adjustable threshold (or null). pass(p,thr) returns true if patient PASSES (kept).
var CRITERIA=[
  {id:'age', type:'inc', label:'Age ≥ 18 years', detail:'Adult', pass:function(p){return p.age>=18;}},
  {id:'nyha',type:'inc', label:'NYHA class II–IV', detail:'Symptomatic HF', pass:function(p){return p.nyha>=2&&p.nyha<=4;}},
  {id:'lvef',type:'inc', label:'LVEF ≤ cutoff', detail:'Reduced ejection fraction', thr:40, thrMin:30, thrMax:45, thrStep:5, thrFmt:function(v){return v+'%';}, pass:function(p,t){return p.lvef<=t;}},
  {id:'bnp', type:'inc', label:'Prior HF hosp ≤ 12mo or ↑ NT-proBNP', detail:'Recent decompensation', pass:function(p){return p.priorHosp||p.bnp;}},
  {id:'gdmt',type:'inc', label:'On stable GDMT ≥ 4 weeks', detail:'Guideline-directed med therapy', pass:function(p){return p.gdmt;}},
  {id:'egfr',type:'exc', label:'eGFR ≥ floor', detail:'Renal function', thr:30, thrMin:20, thrMax:45, thrStep:5, thrFmt:function(v){return v+' mL/min';}, pass:function(p,t){return p.egfr>=t;}},
  {id:'sbp', type:'exc', label:'SBP ≥ 90 mmHg', detail:'No symptomatic hypotension', pass:function(p){return p.sbp>=90;}},
  {id:'recent',type:'exc',label:'No ACS/stroke ≤ 90 days', detail:'No recent CV event', pass:function(p){return !p.recent;}},
  {id:'k',   type:'exc', label:'Potassium ≤ 5.0 mmol/L', detail:'No hyperkalemia', pass:function(p){return p.k<=5.0;}},
  {id:'preg',type:'exc', label:'Not pregnant / lactating', detail:'', pass:function(p){return !p.preg;}},
  {id:'life',type:'exc', label:'Life expectancy ≥ 12 months', detail:'', pass:function(p){return !p.lifeExp;}},
  {id:'other',type:'exc',label:'Not in another trial', detail:'', pass:function(p){return !p.otherTrial;}}
];

/* ---------- regions ---------- */
var REGIONS=[
  {id:'na',name:'North America',share:0.30,lag:2,rate:0.85,cost:42},
  {id:'we',name:'W. Europe',     share:0.25,lag:3,rate:0.90,cost:38},
  {id:'ee',name:'E. Europe',     share:0.20,lag:4,rate:1.55,cost:24},
  {id:'la',name:'Latin America', share:0.15,lag:4,rate:1.40,cost:22},
  {id:'ap',name:'Asia-Pacific',  share:0.10,lag:5,rate:1.10,cost:30}
];

/* ---------- scenario state ---------- */
var SC={
  enabled:{}, thr:{},
  targetN:1200, sites:60, ramp:5, rateMean:2.6, consent:0.85,
  horizon:42, plannedLPR:30, alpha:2.0, strategy:'balanced', budget:44000000
};
CRITERIA.forEach(function(c){SC.enabled[c.id]=true; if(c.thr!=null)SC.thr[c.id]=c.thr;});

var MC_SIMS=200;
var RESULT={};

/* ---------- Engine 1: eligibility funnel ---------- */
function activeCriteria(){return CRITERIA.filter(function(c){return SC.enabled[c.id];});}
function passesAll(p,list){for(var i=0;i<list.length;i++){var c=list[i];if(!c.pass(p,SC.thr[c.id]))return false;}return true;}
function countPass(list){var n=0;for(var i=0;i<POP_N;i++)if(passesAll(POP[i],list))n++;return n;}
function eligibility(){
  var list=activeCriteria();
  // sequential cascade
  var cascade=[], running=POP_N, applied=[];
  cascade.push({id:'__pop',label:'Screened-like HFrEF cohort',type:'pop',remaining:POP_N,drop:0,ret:1});
  for(var i=0;i<list.length;i++){
    applied.push(list[i]);
    var rem=countPass(applied);
    cascade.push({id:list[i].id,label:list[i].label,detail:list[i].detail,type:list[i].type,
      remaining:rem,drop:running-rem,ret:rem/POP_N,thr:SC.thr[list[i].id],fmt:list[i].thrFmt});
    running=rem;
  }
  var eligible=running, yld=eligible/POP_N;
  // marginal recovery (full set-difference): eligible without criterion c, minus eligible
  var killers=[];
  list.forEach(function(c){
    var without=list.filter(function(x){return x.id!==c.id;});
    var rec=countPass(without)-eligible;
    killers.push({id:c.id,label:c.label,recovery:rec,recoveryPct:rec/Math.max(1,eligible)});
  });
  killers.sort(function(a,b){return b.recovery-a.recovery;});
  // a "killer" = removing it recovers > 30% of the current eligible pool
  killers.forEach(function(k){k.isKiller=k.recoveryPct>0.30;});
  return {cascade:cascade,eligible:eligible,yield:yld,killers:killers};
}

/* ---------- Engine 3: site / region plan ---------- */
function sitePlan(){
  // strategy weights
  var w=REGIONS.map(function(r){
    if(SC.strategy==='speed') return r.share*r.rate;
    if(SC.strategy==='cost')  return r.share*(40/r.cost);
    return r.share;
  });
  var ws=w.reduce(function(a,b){return a+b;},0);
  var counts=REGIONS.map(function(r,i){return Math.round(SC.sites*w[i]/ws);});
  // fix rounding to exactly SC.sites
  var diff=SC.sites-counts.reduce(function(a,b){return a+b;},0);
  for(var g=0;g<Math.abs(diff);g++){var idx=g%REGIONS.length;counts[idx]+=(diff>0?1:-1);}
  counts=counts.map(function(c){return Math.max(0,c);});
  // build site list, round-robin activation order, activation = ceil(order/ramp) + region lag
  var sites=[], pools=REGIONS.map(function(r,i){return {r:r,n:counts[i],used:0};});
  var order=0, remaining=true;
  while(remaining){
    remaining=false;
    for(var i2=0;i2<pools.length;i2++){
      if(pools[i2].used<pools[i2].n){
        var base=Math.floor(order/SC.ramp)+1;
        sites.push({region:pools[i2].r, act:base+pools[i2].r.lag, rate:pools[i2].r.rate});
        pools[i2].used++; order++; remaining=true;
      }
    }
  }
  var blendedCost=REGIONS.reduce(function(a,r,i){return a+counts[i]*r.cost;},0)/Math.max(1,SC.sites);
  var fullyActive=sites.reduce(function(m,s){return Math.max(m,s.act);},0);
  return {sites:sites,counts:counts,blendedCost:blendedCost,fullyActive:fullyActive};
}

/* ---------- Engine 2: enrollment forecast (Anisimov Poisson-Gamma) ---------- */
// closed-form cumulative MEAN curve by month: sum_k p * E[lambda]*rateMult * monthsActive_k(t)
function meanCurve(plan,p){
  var H=SC.horizon, Elam=SC.rateMean; // E[lambda] = rateMean screened/site/mo
  var curve=new Array(H+1).fill(0);
  for(var t=0;t<=H;t++){
    var s=0;
    for(var k=0;k<plan.sites.length;k++){
      var ma=Math.max(0,t-plan.sites[k].act+1); // months active by month t
      s+=Elam*plan.sites[k].rate*p*ma;
    }
    curve[t]=s;
  }
  return curve;
}
function varCurve(plan,p){
  // Var of cumulative count of a thinned Poisson-Gamma: per site-month, count ~ NegBin
  // mean m = p*Elam*mult ; var = m + m^2/alpha  (Gamma shape alpha over-dispersion)
  var H=SC.horizon, Elam=SC.rateMean, a=SC.alpha;
  var v=new Array(H+1).fill(0);
  for(var t=0;t<=H;t++){
    var s=0;
    for(var k=0;k<plan.sites.length;k++){
      var ma=Math.max(0,t-plan.sites[k].act+1);
      var m=p*Elam*plan.sites[k].rate; // per month mean for this site
      // sum over ma months: mean ma*m ; var ma*(m + m^2/a)
      s+=ma*(m+m*m/a);
    }
    v[t]=s;
  }
  return v;
}
function monteCarlo(plan,p,sims){
  var H=SC.horizon, a=SC.alpha, scale=SC.rateMean/a; // Gamma(shape a, scale) => mean rateMean
  var nM=plan.sites.length;
  var curves=[]; var lpr=[];
  for(var s=0;s<sims;s++){
    var rngSim=makeRng(909, s, SC.sites|0);
    var cum=new Array(H+1).fill(0);
    var run=0, crossed=-1;
    // per-site lambda drawn from its own sub-stream
    var lam=new Array(nM);
    for(var k=0;k<nM;k++){var rk=makeRng(101,k,s); lam[k]=gammaSample(rk,a)*scale;}
    for(var t=1;t<=H;t++){
      var add=0;
      for(var k2=0;k2<nM;k2++){
        if(t>=plan.sites[k2].act){
          var rate=lam[k2]*plan.sites[k2].rate*p;
          add+=poissonSample(rngSim,rate);
        }
      }
      run+=add; cum[t]=run;
      if(crossed<0&&run>=SC.targetN)crossed=t;
    }
    curves.push(cum);
    lpr.push(crossed<0?H+99:crossed);
  }
  // percentile band per month
  var lo=new Array(H+1),med=new Array(H+1),hi=new Array(H+1),mean=new Array(H+1);
  for(var t2=0;t2<=H;t2++){
    var col=curves.map(function(c){return c[t2];}).sort(function(x,y){return x-y;});
    lo[t2]=col[Math.floor(0.05*(sims-1))];
    med[t2]=col[Math.floor(0.50*(sims-1))];
    hi[t2]=col[Math.floor(0.95*(sims-1))];
    var sum=0;for(var q=0;q<sims;q++)sum+=curves[q][t2];mean[t2]=sum/sims;
  }
  var onTime=lpr.filter(function(x){return x<=SC.plannedLPR;}).length/sims;
  var sortedLpr=lpr.slice().sort(function(x,y){return x-y;});
  var medLpr=sortedLpr[Math.floor(0.5*(sims-1))];
  return {lo:lo,med:med,hi:hi,mean:mean,onTime:onTime,medLpr:medLpr,lpr:lpr};
}

/* ---------- Engine 4: Go/No-Go ---------- */
function ragColor(r){return r;}
function scorecard(elig,plan,fc){
  var dims=[];
  // eligibility
  var anyKiller=elig.killers.some(function(k){return k.isKiller;});
  var eRag=elig.yield>=0.40&&!anyKiller?'green':(elig.yield>=0.25||(elig.yield>=0.40)?'amber':'red');
  if(elig.yield<0.25)eRag='red'; else if(elig.yield<0.40||anyKiller)eRag='amber'; else eRag='green';
  dims.push({key:'elig',name:'Eligibility',detail:'pool viable?',rag:eRag,
    score:clamp(elig.yield/0.6*100,0,100),
    val:pct(elig.yield),note:anyKiller?'killer criterion present':(pct(elig.yield)+' of screened randomizable')});
  // enrollment
  var enRag=fc.onTime>=0.80?'green':(fc.onTime>=0.50?'amber':'red');
  dims.push({key:'enr',name:'Enrollment',detail:'on time?',rag:enRag,
    score:clamp(fc.onTime*100,0,100),
    val:pct(fc.onTime),note:'P(N by m'+SC.plannedLPR+'); median LPR m'+(fc.medLpr>SC.horizon?'>'+SC.horizon:fc.medLpr)});
  // operational
  var halfH=SC.horizon*0.5;
  var canReach=fc.mean[SC.horizon]>=SC.targetN;
  var opRag=(plan.fullyActive<=halfH&&canReach)?'green':(canReach?'amber':'red');
  dims.push({key:'op',name:'Operational',detail:'sites & timeline',rag:opRag,
    score:clamp((canReach?70:30)+(plan.fullyActive<=halfH?30:0),0,100),
    val:'m'+plan.fullyActive,note:'all '+SC.sites+' sites active by m'+plan.fullyActive});
  // cost
  var totalCost=plan.blendedCost*1000*SC.targetN;
  var ratio=totalCost/SC.budget;
  var coRag=ratio<=1.0?'green':(ratio<=1.15?'amber':'red');
  dims.push({key:'cost',name:'Cost',detail:'vs budget',rag:coRag,
    score:clamp((2-ratio)*100,0,100),
    val:'$'+(totalCost/1e6).toFixed(1)+'M',note:'$'+Math.round(plan.blendedCost)+'k/patient blended'});
  // gate: overall = worst
  var order={green:0,amber:1,red:2}, worst='green';
  dims.forEach(function(d){if(order[d.rag]>order[worst])worst=d.rag;});
  var comp=dims.reduce(function(a,d){return a+d.score;},0)/dims.length;
  return {dims:dims,overall:worst,composite:comp};
}

/* ---------- recompute ---------- */
function recompute(full){
  var elig=eligibility();
  var p=elig.yield*SC.consent;        // screen-to-randomize probability (reconciliation)
  var plan=sitePlan();
  var mean=meanCurve(plan,p), vc=varCurve(plan,p);
  var fc;
  if(full){
    fc=monteCarlo(plan,p,MC_SIMS);
  }else{
    // light preview: normal approx from closed-form mean + variance
    var H=SC.horizon, lo=[],hi=[],med=[];
    for(var t=0;t<=H;t++){var sd=Math.sqrt(Math.max(1,vc[t]));lo.push(Math.max(0,mean[t]-1.645*sd));med.push(mean[t]);hi.push(mean[t]+1.645*sd);}
    var sdL=Math.sqrt(Math.max(1,vc[SC.plannedLPR]));
    var onTime=1-normCdf((SC.targetN-mean[SC.plannedLPR])/sdL);
    // median LPR = month mean crosses target
    var medLpr=H+99;for(var t2=0;t2<=H;t2++){if(mean[t2]>=SC.targetN){medLpr=t2;break;}}
    fc={lo:lo,med:med,hi:hi,mean:mean,onTime:clamp(onTime,0,1),medLpr:medLpr,lpr:null,approx:true};
  }
  fc.closedMean=mean;
  var sg=scorecard(elig,plan,fc);
  RESULT={elig:elig,p:p,plan:plan,fc:fc,sg:sg};
  return RESULT;
}

function gauge(score,rag,opts){

function miniFunnel(elig){
  var c=elig.cascade, init=POP_N, h='<div class="fn">';
  // show a compact subset: pop + 4 biggest droppers + final
  var steps=c.slice(1).map(function(x){return x;});
  var big=steps.slice().sort(function(a,b){return b.drop-a.drop;}).slice(0,4).map(function(x){return x.id;});
  h+=fnBar({label:'Screened',remaining:init,ret:1,type:'pop'},init,false);
  c.slice(1).forEach(function(x){if(big.indexOf(x.id)>=0)h+=fnBar(x,init,elig.killers.some(function(k){return k.id===x.id&&k.isKiller;}));});
  h+=fnBar({label:'Eligible',remaining:elig.eligible,ret:elig.yield,type:'final'},init,false,true);
  h+='</div>';return h;
}
function fnBar(x,init,killer,final){
  var w=Math.max(2,100*x.remaining/init);
  var col=x.type==='pop'?'background:var(--muted)':(final?'background:linear-gradient(90deg,hsl(160 84% 36%),hsl(160 70% 44%))':'');
  return '<div class="fnrow"><div class="fl"><span class="ftxt">'+x.label.replace(/ ≤ cutoff| ≥ floor/,'')+'</span>'+(killer?'<span class="kf">KILLER</span>':'')+'</div>'+
    '<div class="fnbar"><i style="width:'+w.toFixed(1)+'%;'+col+'"></i><span>'+comma(x.remaining)+'</span></div></div>';
}
function miniRegions(plan){
  var max=Math.max.apply(null,plan.counts)||1,h='<div class="reg">';
  REGIONS.forEach(function(r,i){var c=plan.counts[i];
    h+='<div class="regrow" style="grid-template-columns:96px 1fr 60px"><div class="rn" style="font-size:11.5px">'+r.name+'</div>'+
      '<div class="rt"><i style="width:'+(100*c/max).toFixed(0)+'%"></i></div>'+
      '<div class="rv"><b>'+c+'</b> sites</div></div>';});
  h+='</div>';return h;
}

function renderEligibility(){
  var r=RESULT, elig=r.elig;

  h+='<div class="card"><div class="h">'+ic(ICN.funnel)+'Protocol eligibility funnel<span class="r">'+comma(elig.eligible)+' eligible · yield '+pct(elig.yield,1)+'</span></div><div class="b">';

  h+='<table class="tbl"><thead><tr><th>Criterion</th><th style="text-align:right">If removed, eligible</th><th style="text-align:right">Recovery</th><th style="text-align:right">% of current pool</th></tr></thead><tbody>';

var debTimer=null;

}

function wireRail(){
  var rail=$('#rail');
  rail.addEventListener('click',function(e){
    var cr=e.target.closest('[data-crit]');
    if(cr){var id=cr.getAttribute('data-crit'); SC.enabled[id]=!SC.enabled[id]; cr.classList.toggle('on'); cr.classList.toggle('off'); onControlChange(false); return;}
    var st=e.target.closest('[data-strat]');
    if(st){SC.strategy=st.getAttribute('data-strat'); $('#seg-strat').querySelectorAll('button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-strat')===SC.strategy);}); onControlChange(false); return;}
  });
  rail.addEventListener('input',function(e){
    var sc=e.target.getAttribute('data-sc');
    if(sc){var v=parseFloat(e.target.value); SC[sc]=v; var sv=$('#sv-'+sc); if(sv){var fmtMap={targetN:comma,sites:String,ramp:function(x){return x+'/mo';},rateMean:function(x){return x.toFixed(1)+'/site/mo';},plannedLPR:function(x){return 'm'+x;}}; sv.textContent=fmtMap[sc](v);} onControlChange(true); return;}
    var th=e.target.getAttribute('data-thr');
    if(th){SC.thr[th]=parseFloat(e.target.value); refreshRailReadouts(); onControlChange(true);}
  });
  rail.addEventListener('change',function(e){ if(e.target.getAttribute('data-sc')||e.target.getAttribute('data-thr')){ recompute(true); renderAll(); } });
}

}

/* ---------- self-test (console) ---------- */
function selfTest(){
  recompute(true);
  var r=RESULT;
  var ok=true;
  function chk(name,cond,extra){ if(!cond)ok=false; console.log((cond?'PASS':'FAIL')+' '+name+(extra?'  '+extra:'')); }
  chk('yield in (0,1)', r.elig.yield>0&&r.elig.yield<1, 'yield='+r.elig.yield.toFixed(3));
  chk('screen-to-random p = yield*consent', Math.abs(r.p-r.elig.yield*SC.consent)<1e-9, 'p='+r.p.toFixed(3));
  var endMean=r.fc.closedMean[SC.horizon], endMC=r.fc.mean[SC.horizon];
  chk('MC mean ~ closed-form (<6%)', Math.abs(endMean-endMC)/endMean<0.06, 'MC='+Math.round(endMC)+' CF='+Math.round(endMean));
  // scorecard P(on-time) equals forecast P(on-time)
  var enr=r.sg.dims.filter(function(d){return d.key==='enr';})[0];
  chk('scorecard reads forecast onTime', Math.abs(parseFloat(enr.val)/100-r.fc.onTime)<0.011, 'onTime='+r.fc.onTime.toFixed(3));
  // set-difference recovery non-negative
  chk('marginal recovery >= 0', r.elig.killers.every(function(k){return k.recovery>=0;}));
  console.log('--- feasibility metrics ---');
  console.log('yield='+pct(r.elig.yield,1)+'  P(onTime)='+pct(r.fc.onTime,1)+'  medLPR=m'+r.fc.medLpr+'  verdict='+ragLabel(r.sg.overall)+'  composite='+Math.round(r.sg.composite));
  console.log('killers='+r.elig.killers.filter(function(k){return k.isKiller;}).map(function(k){return k.id;}).join(',')||'none');
  console.log(ok?'SELFTEST_OK':'SELFTEST_FAIL');
  var sink=document.getElementById('selftest');
  if(sink)sink.textContent=(ok?'SELFTEST_OK':'SELFTEST_FAIL')+' | yield='+r.elig.yield.toFixed(3)+' p='+r.p.toFixed(3)+
    ' onTime='+r.fc.onTime.toFixed(3)+' medLPR='+r.fc.medLpr+' MC='+Math.round(endMC)+' CF='+Math.round(endMean)+
    ' verdict='+ragLabel(r.sg.overall)+' comp='+Math.round(r.sg.composite)+
    ' killers='+(r.elig.killers.filter(function(k){return k.isKiller;}).map(function(k){return k.id;}).join(',')||'none')+
    ' dims='+r.sg.dims.map(function(d){return d.key+':'+d.rag;}).join(',');
}

/* ---------- init ---------- */
(function init(){
  var params=new URLSearchParams(location.search);
  if(params.get('still')==='1'){
    document.body.classList.add('still');
    // a deliberately tight base scenario -> Amber (CONDITIONAL): a killer LVEF cutoff
    // pulls eligibility down, but extra sites keep enrollment off red, so the verdict
    // is gated to Amber, not No-Go, with action required.
    SC.thr.lvef=35; SC.sites=60; SC.targetN=1000; SC.plannedLPR=30;
    MC_SIMS=240;
  }
  // deep-linkable scenario overrides (also a fast calibration harness)
  [['n','targetN'],['sites','sites'],['rate','rateMean'],['lpr','plannedLPR'],['ramp','ramp'],['horizon','horizon']].forEach(function(o){
    var v=params.get(o[0]); if(v!=null&&!isNaN(+v))SC[o[1]]=+v;
  });
  if(params.get('lvef'))SC.thr.lvef=+params.get('lvef');
  if(params.get('egfr'))SC.thr.egfr=+params.get('egfr');
  if(params.get('strat')&&['balanced','speed','cost'].indexOf(params.get('strat'))>=0)SC.strategy=params.get('strat');
  buildTabs();
  $('#rail').innerHTML=buildRail();
  wireRail(); wireStage();
  selfTest();          // runs recompute(true) and logs
  renderAll();
  var wantTab=params.get('tab');
  if(wantTab&&['cockpit','eligibility','enrollment','sites','gono'].indexOf(wantTab)>=0)gotoTab(wantTab);
})();
</script>
</body>
</html>
